<!DOCTYPE html>
<html>
<head>
    <title>Test Admin API Keys</title>
</head>
<body>
    <h1>Test des clés API</h1>
    <button onclick="testLoadApiKeys()">Tester loadApiKeys</button>
    <div id="result"></div>

    <script>
        const API_BASE = 'http://localhost:5000/api/v1';
        const API_KEY = '8a2hL:9o*.g8&*>;^2GP5Q;tT~-n]^Nl';

        async function testLoadApiKeys() {
            console.log('Testing loadApiKeys...');
            document.getElementById('result').innerHTML = 'Chargement...';
            
            try {
                const response = await fetch(`${API_BASE}/admin/apikeys`, {
                    headers: { 'X-API-Key': API_KEY }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                console.log('Données reçues:', data);

                if (!data || !data.api_keys) {
                    throw new Error('Données invalides');
                }

                console.log(`${data.api_keys.length} clés API trouvées`);

                // Construction du HTML complet
                let html = '<table border="1"><thead><tr><th>Nom</th><th>Type</th><th>Statut</th></tr></thead><tbody>';
                data.api_keys.forEach(key => {
                    console.log('Traitement clé:', key.name, key.is_active);
                    html += `
                        <tr>
                            <td>${key.name}</td>
                            <td>${key.is_admin ? 'Admin' : 'Standard'}</td>
                            <td>${key.is_active ? 'Actif' : 'Inactif'}</td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';

                console.log('HTML généré:', html.substring(0, 200) + '...');
                document.getElementById('result').innerHTML = html;

            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('result').innerHTML = `Erreur: ${error.message}`;
            }
        }
    </script>
</body>
</html>
