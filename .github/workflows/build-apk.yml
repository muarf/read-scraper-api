name: Build Android APK

on:
  push:
    branches: [main, master, feature/*]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install npm dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Build web assets
        working-directory: ./mobile
        run: |
          mkdir -p www
          cp www/index.html index.html

      - name: Sync Capacitor
        working-directory: ./mobile
        run: npx cap sync android

      - name: Copy BnfLogin plugin source
        run: |
          PLUGIN_SRC="mobile/src/plugins/bnf-login/android/src/main/java/io/qzz/pressecraper/BnfLoginPlugin.java"
          PLUGIN_DST="mobile/android/app/src/main/java/io/qzz/pressecraper/BnfLoginPlugin.java"
          if [ -f "$PLUGIN_SRC" ]; then
            cp "$PLUGIN_SRC" "$PLUGIN_DST"
            echo "BnfLogin plugin copied"
          else
            echo "BnfLogin plugin source not found at $PLUGIN_SRC"
            find mobile/src -name "BnfLoginPlugin.java" 2>/dev/null
            exit 1
          fi

      - name: Register BnfLogin plugin
        run: |
          PLUGINS_FILE="mobile/android/app/src/main/assets/capacitor.plugins.json"
          if [ -f "$PLUGINS_FILE" ]; then
            python3 -c "
          import json
          with open('$PLUGINS_FILE', 'r') as f:
              plugins = json.load(f)
          if not any(p.get('classpath', '').endswith('BnfLoginPlugin') for p in plugins):
              plugins.append({
                  'pkg': 'BnfLogin',
                  'classpath': 'io.qzz.pressecraper.BnfLoginPlugin'
              })
              with open('$PLUGINS_FILE', 'w') as f:
                  json.dump(plugins, f, indent=2)
              print('BnfLogin plugin registered')
          else:
              print('BnfLogin plugin already registered')
          "
          else
            echo "capacitor.plugins.json not found, creating..."
            echo '[{"pkg":"BnfLogin","classpath":"io.qzz.pressecraper.BnfLoginPlugin"}]' > "$PLUGINS_FILE"
          fi


      - name: Copy BackgroundPoll plugin source
        run: |
          PLUGIN_SRC="mobile/src/plugins/background-poll/android/src/main/java/io/qzz/pressecraper/BackgroundPollPlugin.java"
          PLUGIN_DST="mobile/android/app/src/main/java/io/qzz/pressecraper/BackgroundPollPlugin.java"
          if [ -f "$PLUGIN_SRC" ]; then
            cp "$PLUGIN_SRC" "$PLUGIN_DST"
            echo "BackgroundPoll plugin copied"
          else
            echo "BackgroundPoll plugin source not found at $PLUGIN_SRC"
            find mobile/src -name "BackgroundPollPlugin.java" 2>/dev/null
            exit 1
          fi

      - name: Register BackgroundPoll plugin
        run: |
          PLUGINS_FILE="mobile/android/app/src/main/assets/capacitor.plugins.json"
          if [ -f "$PLUGINS_FILE" ]; then
            python3 -c "
          import json
          with open('$PLUGINS_FILE', 'r') as f:
              plugins = json.load(f)
          if not any(p.get('classpath', '').endswith('BackgroundPollPlugin') for p in plugins):
              plugins.append({
                  'pkg': 'BackgroundPoll',
                  'classpath': 'io.qzz.pressecraper.BackgroundPollPlugin'
              })
              with open('$PLUGINS_FILE', 'w') as f:
                  json.dump(plugins, f, indent=2)
              print('BackgroundPoll plugin registered')
          else:
              print('BackgroundPoll plugin already registered')
          "
          fi


      - name: Copy IntentForwarder plugin source
        run: |
          PLUGIN_SRC="mobile/src/plugins/intent/android/src/main/java/io/qzz/pressecraper/IntentForwarderPlugin.java"
          PLUGIN_DST="mobile/android/app/src/main/java/io/qzz/pressecraper/IntentForwarderPlugin.java"
          if [ -f "$PLUGIN_SRC" ]; then
            cp "$PLUGIN_SRC" "$PLUGIN_DST"
            echo "IntentForwarder plugin copied"
          else
            echo "IntentForwarder plugin source not found at $PLUGIN_SRC"
            find mobile/src -name "IntentForwarderPlugin.java" 2>/dev/null
            exit 1
          fi

      - name: Register IntentForwarder plugin
        run: |
          PLUGINS_FILE="mobile/android/app/src/main/assets/capacitor.plugins.json"
          if [ -f "$PLUGINS_FILE" ]; then
            python3 -c "
          import json
          with open('$PLUGINS_FILE', 'r') as f:
              plugins = json.load(f)
          if not any(p.get('classpath', '').endswith('IntentForwarderPlugin') for p in plugins):
              plugins.append({
                  'pkg': 'IntentForwarder',
                  'classpath': 'io.qzz.pressecraper.IntentForwarderPlugin'
              })
              with open('$PLUGINS_FILE', 'w') as f:
                  json.dump(plugins, f, indent=2)
              print('IntentForwarder plugin registered')
          else:
              print('IntentForwarder plugin already registered')
          "
          fi

      - name: Allow cleartext HTTP traffic
        run: |
          MANIFEST="mobile/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Add usesCleartextTraffic="true" to <application> tag (handle various formats)
            sed -i 's/<application\b/<application android:usesCleartextTraffic="true"/g' "$MANIFEST"
            echo "Patched AndroidManifest.xml"
            grep -o 'usesCleartextTraffic="true"' "$MANIFEST" || echo "WARNING: pattern not found"
          else
            echo "AndroidManifest.xml not found!"
            find mobile/android -name "AndroidManifest.xml" 2>/dev/null
            exit 1
          fi

      - name: Build APK
        working-directory: ./mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
