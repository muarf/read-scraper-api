<!-- server/templates/index.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📰 Presse Scraper</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <script src="https://cdn.socket.io/4.7.4/socket.io.js"></script> 
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>
    <!-- Modal Popup -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-content"></div>
        </div>
    </div>
    
    <div class="container">
        <div class="header-section">
            <h1><i class="fas fa-newspaper"></i> Presse Scraper</h1>
            <p>Extrayez et analysez des articles de presse rapidement</p>
        </div>
        
        <div class="form-section">
            <form method="post" id="articleForm">
                <div class="form-group">
                    <label for="url"><i class="fas fa-link"></i> URL de l'article</label>
                    <input type="text" id="url" name="url" class="form-control" placeholder="https://exemple.com/article" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-magic"></i> Extraire l'article
                </button>
            </form>
        </div>
        <div id="article-content" style="display: none;">
            <div id="link-pdf"></div>
            <h2>
                <i class="fas fa-file-alt"></i> Contenu de l'article 
                <span class="percentage-badge" id="article-percentage"></span>%
            </h2>
            <div class="card">
                <div class="card-body" id="article-body">
                    <style>
                        #article-content img {
                            max-width: 100%;
                            height: auto;
                            border-radius: 8px;
                            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                            margin: 15px 0;
                        }
                    </style>
                </div>
            </div>
        </div>

        <div id="results-section" style="display: none;">
            <h2>
                <i class="fas fa-list"></i> Articles similaires
            </h2>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th><i class="fas fa-image"></i> Logo</th>
                            <th><i class="fas fa-heading"></i> Titre</th>
                            <th><i class="fas fa-calendar"></i> Date</th>
                            <th><i class="fas fa-percentage"></i> Probabilité</th>
                        </tr>
                    </thead>
                    <tbody id="results-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>




    <!-- Ajouter le script Bootstrap JavaScript (assurez-vous de télécharger et inclure Bootstrap dans votre projet) -->
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

    <!-- ... Votre script JavaScript ... -->
<!-- Ajoutez ces consoles logs à votre script JavaScript dans votre fichier HTML -->
<script>

    document.addEventListener('DOMContentLoaded', function() {
        // Créer une connexion Socket.IO
        var fullPath = window.location.pathname
        //var fullPath = "http://127.0.0.1:5000"
        const socket = io(fullPath, { path: '/socket.io' });
        var session_id;
        // Console log pour vérifier la connexion Socket.IO
        console.log('Connexion Socket.IO établie avec succès!');
        

        // Récupérer le modal et son contenu
        var modal = document.getElementById('myModal');
        var modalContent = document.getElementById('modal-content');

        // Récupérer le bouton de fermeture du modal
        var closeBtn = document.getElementsByClassName('close')[0];

        // Console log pour vérifier le chemin du Socket.IO
        console.log('Chemin du Socket.IO :', socket.io.uri);
        socket.on('session_id', function (data) {
            session_id = data.session_id;
            console.log('ID utilisateur :', session_id);
            handleSessionId(session_id);
        });
     
        function handleSessionId(session_id) {
        console.log("server_message_" + session_id);
        // Écouter l'événement socket et mettre à jour le contenu du modal
        socket.on(`server_message_${session_id}`, function (data) {

        // Mettre à jour le contenu de la modal avec le nouveau message
            var modalContent = document.getElementById('modal-content');
            var messageDiv = document.createElement('div');
            
            // Ajouter une icône selon le type de message
            var icon = '<i class="fas fa-spinner fa-spin"></i> ';
            if (data.message.includes('erreur') || data.message.includes('Erreur')) {
                icon = '<i class="fas fa-exclamation-circle"></i> ';
            } else if (data.message.includes('terminé') || data.message.includes('Terminé')) {
                icon = '<i class="fas fa-check-circle"></i> ';
            }
            
            messageDiv.innerHTML = icon + data.message;
            modalContent.appendChild(messageDiv);

            // Faire défiler vers le bas pour afficher le dernier message ajouté
            modalContent.scrollTop = modalContent.scrollHeight;

            // S'assurer que la modal est visible
            modal.classList.add('show');

            // Masquer le message le plus ancien après l'ajout de 5 messages
            if (modalContent.children.length > 5) {
                modalContent.removeChild(modalContent.children[0]);
            }
        });
         socket.on(`submit_response_${session_id}`, function(data) {
        // Console log pour vérifier la réception de la réponse côté client
        console.log('Réponse reçue du serveur :', data);
        var modal = document.getElementById('myModal');
        modal.classList.remove('show');
        console.log('on ferme le modal');

        // Mise à jour du contenu de la page avec les données de la réponse
        if (data.article) {
            document.getElementById('link-pdf').innerHTML = '<a href="' + fullPath + data.pdf_link + '"><i class="fas fa-download"></i> Télécharger le PDF</a>';
            document.getElementById('article-content').style.display = 'block';
            document.getElementById('article-percentage').innerText = data.percentage;
            document.getElementById('article-body').innerHTML = data.article;
        }
        
        // Mise à jour des résultats
        if (data.results) {
            var resultsTable = document.getElementById('results-table-body');
            resultsTable.innerHTML = ''; // Effacer le contenu actuel

            for (var i = 0; i < data.results.length; i++) {
                var result = data.results[i];
                var newRow = resultsTable.insertRow(i);
                newRow.classList.add('result-row');
                
                // Déterminer la classe du badge de probabilité
                var percent = parseInt(result.percentage);
                var badgeClass = percent >= 80 ? 'probability-high' : (percent >= 50 ? 'probability-medium' : 'probability-low');

                newRow.innerHTML = `
                    <td><strong>${result.logo}</strong></td>
                    <td>${result.title}</td>
                    <td>${result.date}</td>
                    <td><span class="probability-badge ${badgeClass}">${result.percentage}%</span></td>
                `;
                newRow.setAttribute('data-link', result.link);
            }

            document.getElementById('results-section').style.display = 'block';
        }
        });    
        }

        // Fermer le modal lorsqu'on clique sur le bouton de fermeture
        closeBtn.onclick = function() {
            modal.classList.remove('show');
        };
    socket.onAny((event, ...args) => {
             console.log('Reçu un événement :', event, 'avec des données :', args);
        });
      


        // Empêcher le rechargement de la page lors de la soumission du formulaire
    var form = document.getElementById('articleForm');
    form.addEventListener('submit', function(event) {
        event.preventDefault();
        // Récupérer la valeur de l'URL du formulaire
        var url = document.getElementById('url').value;

        // Votre code pour envoyer l'URL au serveur via Socket.IO
        socket.emit('submit_form', { url: url });
    });
    socket.on('server_message : ca commence', function(data) {
        console.log('Début du traitement côté client...');
        // Afficher la modal au début du traitement
        showModal();
    });

    // Écouter l'événement pour refléter la fin du traitement
    socket.on('server_message', function(data) {
        if(data.termine){
        console.log('Traitement terminé côté client...');
        // Fermer la modal à la fin du traitement
        closeModal();    
        }
    });

    // Fonction pour afficher la modal
    function showModal() {
        var modal = document.getElementById('myModal');
        modal.classList.add('show');
    }

    // Fonction pour fermer la modal
    function closeModal() {
        var modal = document.getElementById('myModal');
        modal.classList.remove('show');
    }

});
</script>

<script>

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('results-table-body').addEventListener('click', function(event) {
        var target = event.target;
        while (target !== event.currentTarget) {
            if (target.className === 'result-row') {
                console.log('Clic sur la ligne de résultat');
                var logo = target.querySelector('td:nth-child(1)').textContent;
                var title = target.querySelector('td:nth-child(2)').textContent;
                var date = target.querySelector('td:nth-child(3)').textContent;
                var link = target.dataset.link;
                console.log('Données à envoyer :', { logo: logo, title: title, date: date, link: link });
                var xhr = new XMLHttpRequest();
                var fullPath = window.location.href;
                console.log('fullPath :', { fullPath: fullPath });
               
                xhr.open('POST', fullPath + '/download', true);
                xhr.setRequestHeader('Content-Type', 'application/json;charset=UTF-8');

                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        var articleContent = JSON.parse(xhr.responseText).article;
                        document.getElementById('article-content').innerHTML = articleContent;
                        document.getElementById('article-content').style.display = 'block';
                    }
                };

                xhr.send(JSON.stringify({ logo: logo, title: title, date: date, link: link }));
                console.log('Données envoyées au serveur :', { logo: logo, title: title, date: date });
            }
            target = target.parentNode;
        }
    });
});

</script>

</body>
</html>
