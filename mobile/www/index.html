<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f1a">
    <title>Presse Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f0f1a; --bg-secondary: #1a1a2e; --bg-card: #16213e;
            --accent: #e94560; --accent-hover: #ff6b81;
            --text-primary: #eee; --text-secondary: #888;
            --success: #00d2d3; --warning: #ffa502; --border: #2a2a4a;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            min-height: 100vh; -webkit-tap-highlight-color: transparent;
            padding-bottom: 80px;
        }
        .container { max-width: 480px; margin: 0 auto; }

        /* Header */
        .header {
            background: var(--bg-secondary); padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .header h1 i { color: var(--accent); }

        /* Screens */
        .screen { display: none; padding: 16px; animation: fadeIn .3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* Shared banner */
        .shared-banner {
            background: linear-gradient(135deg, var(--accent), #ff6b81);
            border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
            display: none; align-items: center; gap: 12px;
        }
        .shared-banner.visible { display: flex; }
        .shared-banner .icon { font-size: 24px; }
        .shared-banner .text { flex: 1; }
        .shared-banner .text .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; }
        .shared-banner .text .content { font-size: 14px; font-weight: 500; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .shared-banner .use-btn {
            background: rgba(255,255,255,0.2); border: none; color: white;
            padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; white-space: nowrap;
        }

        /* Input */
        .input-card {
            background: var(--bg-card); border-radius: 14px; padding: 16px;
            border: 1px solid var(--border); margin-bottom: 16px;
        }
        .input-card label {
            display: block; font-size: 12px; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .input-row { display: flex; gap: 8px; }
        .input-row input {
            flex: 1; background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 14px; color: var(--text-primary);
            font-size: 15px; font-family: inherit; outline: none;
        }
        .input-row input:focus { border-color: var(--accent); }
        .input-row input::placeholder { color: #555; }
        .scrape-btn {
            background: var(--accent); color: white; border: none; border-radius: 10px;
            padding: 12px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
            transition: all .2s;
        }
        .scrape-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .scrape-btn.loading { background: var(--warning); }

        /* Status */
        .status-card {
            background: var(--bg-card); border-radius: 14px; padding: 20px;
            border: 1px solid var(--border); text-align: center; display: none; margin-bottom: 16px;
        }
        .status-card.visible { display: block; }
        .status-icon { font-size: 40px; margin-bottom: 12px; }
        .status-card.processing .status-icon { color: var(--warning); animation: spin 1.5s linear infinite; }
        .status-card.success .status-icon { color: var(--success); }
        .status-card.error .status-icon { color: var(--accent); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .status-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .status-sub { font-size: 12px; color: var(--text-secondary); }
        .progress-bar { width: 100%; height: 3px; background: var(--bg-secondary); border-radius: 2px; margin-top: 14px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .5s ease; width: 0%; }

        .action-row { display: flex; gap: 10px; margin-top: 16px; }
        .action-btn {
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .action-btn.primary { background: var(--accent); color: white; }
        .action-btn.secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }

        /* History */
        .section-title { font-size: 14px; font-weight: 700; margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .history-item {
            background: var(--bg-card); border-radius: 10px; padding: 12px 14px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px; cursor: pointer;
        }
        .history-item .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
        .history-item .icon.pdf { background: rgba(233,69,96,0.15); color: var(--accent); }
        .history-item .icon.pending { background: rgba(255,165,2,0.15); color: var(--warning); }
        .history-item .info { flex: 1; min-width: 0; }
        .history-item .title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item .meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .badge { font-size: 10px; padding: 3px 7px; border-radius: 5px; font-weight: 600; flex-shrink: 0; }
        .badge.done { background: rgba(0,210,211,0.15); color: var(--success); }
        .badge.fail { background: rgba(233,69,96,0.15); color: var(--accent); }
        .empty { text-align: center; padding: 30px; color: var(--text-secondary); }
        .empty i { font-size: 36px; margin-bottom: 10px; opacity: 0.3; }

        /* Settings */
        .settings-group { margin-bottom: 20px; }
        .settings-group h3 { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .setting-item { background: var(--bg-card); border-radius: 10px; padding: 14px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .setting-item .label { font-size: 13px; font-weight: 500; }
        .setting-item .value { font-size: 12px; color: var(--text-secondary); }
        .setting-item .value.connected { color: var(--success); }

        /* Form inputs in settings */
        .form-input {
            width: 100%; background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 12px; color: var(--text-primary);
            font-size: 13px; font-family: inherit; outline: none; margin-bottom: 8px;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: #555; }

        /* Cookie status */
        .cookie-status {
            display: flex; align-items: center; gap: 8px; padding: 10px 14px;
            background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border);
            margin-bottom: 8px; font-size: 13px;
        }
        .cookie-status .dot { width: 8px; height: 8px; border-radius: 50%; }
        .cookie-status .dot.ok { background: var(--success); }
        .cookie-status .dot.expired { background: var(--warning); }
        .cookie-status .dot.none { background: var(--accent); }

        /* Toast */
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; font-weight: 500; z-index: 2000; transition: transform .3s ease; display: flex; align-items: center; gap: 8px; max-width: 90%; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--accent); }

        /* Bottom nav */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 6px 0; z-index: 100; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 14px; background: none; border: none; color: var(--text-secondary); font-size: 10px; cursor: pointer; }
        .nav-btn i { font-size: 18px; }
        .nav-btn.active { color: var(--accent); }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <header class="header">
        <h1><i class="fas fa-newspaper"></i> Presse Scraper</h1>
    </header>

    <!-- Home -->
    <div class="screen active" id="homeScreen">
        <!-- Shared content banner -->
        <div class="shared-banner" id="sharedBanner">
            <i class="fas fa-share-alt icon"></i>
            <div class="text">
                <div class="label" id="sharedLabel">Contenu partagé</div>
                <div class="content" id="sharedContent"></div>
            </div>
            <button class="use-btn" id="useSharedBtn">Utiliser</button>
        </div>

        <div class="input-card">
            <label>URL de l'article ou termes de recherche</label>
            <div class="input-row">
                <input type="text" id="urlInput" placeholder="Collez un lien ou tapez des mots-clés..." autocomplete="off" />
                <button class="scrape-btn" id="scrapeBtn"><i class="fas fa-magic"></i> Scraper</button>
            </div>
        </div>

        <div class="status-card" id="statusCard">
            <div class="status-icon"><i class="fas fa-spinner" id="statusIcon"></i></div>
            <div class="status-title" id="statusTitle">Initialisation...</div>
            <div class="status-sub" id="statusSub"></div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="action-row" id="actionRow" style="display:none;">
                <button class="action-btn secondary" id="cancelBtn"><i class="fas fa-times"></i> Annuler</button>
                <button class="action-btn primary" id="downloadBtn" style="display:none;"><i class="fas fa-download"></i> PDF</button>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-history"></i> Historique</div>
        <div id="historyList"><div class="empty"><i class="fas fa-inbox"></i><p>Aucun article</p></div></div>
    </div>

    <!-- Settings -->
    <div class="screen" id="settingsScreen">
        <div class="settings-group">
            <h3>Serveur API</h3>
            <div style="padding: 0 14px;">
                <input type="text" id="apiUrlInput" value="http://141.145.223.71:5000" class="form-input" placeholder="http://IP:5000">
            </div>
        </div>

        <div class="settings-group">
            <h3>Connexion BnF <small style="font-weight:normal;color:var(--text-secondary)">(Europresse)</small></h3>
            <div style="padding: 0 14px;">
                <input type="text" id="bnfUsername" class="form-input" placeholder="Identifiant BnF..." autocomplete="off">
                <input type="password" id="bnfPassword" class="form-input" placeholder="Mot de passe BnF..." autocomplete="off">
                <button class="action-btn primary" id="saveBnfBtn" style="width:100%;margin-top:4px;">
                    <i class="fas fa-save"></i> Sauvegarder
                </button>
            </div>
        </div>

        <div class="settings-group">
            <h3>Session BnF</h3>
            <div class="cookie-status" id="cookieStatus">
                <div class="dot none" id="cookieDot"></div>
                <span id="cookieText">Non connecté</span>
            </div>
            <button class="action-btn secondary" id="loginBnfBtn" style="width:100%;margin-top:8px;">
                <i class="fas fa-key"></i> Se connecter à Europresse
            </button>
            <button class="action-btn secondary" id="clearBnfBtn" style="width:100%;margin-top:8px;">
                <i class="fas fa-trash"></i> Supprimer les données BnF
            </button>
        </div>

        <div class="settings-group">
            <h3>Stockage</h3>
            <div class="setting-item">
                <div class="label">Articles en cache</div>
                <div class="value" id="cacheCount">0</div>
            </div>
            <button class="action-btn secondary" id="clearCacheBtn" style="width:100%; margin-top:8px;">
                <i class="fas fa-trash"></i> Vider le cache
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"><i class="fas fa-info-circle"></i><span id="toastText"></span></div>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-screen="homeScreen"><i class="fas fa-home"></i><span>Accueil</span></button>
        <button class="nav-btn" data-screen="settingsScreen"><i class="fas fa-cog"></i><span>Paramètres</span></button>
    </nav>
</div>

<script>
(function() {
    'use strict';

    // ===== CONFIG =====
    const STORAGE_KEY = 'presse_scraper_v3';
    const BNF_AUTH_URL = 'https://bnf.idm.oclc.org/login?url=https://nouveau.europresse.com/access/ip/default.aspx?un=D000067U_1';
    const BNF_DOMAIN = 'nouveau-europresse-com.bnf.idm.oclc.org';

    // ===== STATE =====
    let state = {
        apiUrl: 'http://141.145.223.71:5000',
        bnfUsername: '',
        bnfPassword: '',
        bnfCookies: null,       // [{name, value, domain, path, expires, ...}]
    bnfCookiesExpiry: null,  // timestamp ms
        history: [],
        currentJobId: null,
        pollInterval: null,
        sharedText: null,
        sharedUrl: null
    };

    // ===== STORAGE =====
    function load() {
        try {
            const s = localStorage.getItem(STORAGE_KEY);
            if (s) Object.assign(state, JSON.parse(s));
        } catch(e) {}
    }
    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            apiUrl: state.apiUrl,
            bnfUsername: state.bnfUsername,
            bnfPassword: state.bnfPassword,
            bnfCookies: state.bnfCookies,
            bnfCookiesExpiry: state.bnfCookiesExpiry,
            history: state.history
        }));
    }

    // ===== DOM =====
    const $ = id => document.getElementById(id);

    // ===== TOAST =====
    let toastTimer = null;
    function toast(msg, type='') {
        const el = $('toast');
        $('toastText').textContent = msg;
        el.className = 'toast ' + type + ' show';
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 5000);
    }

    // ===== NAV =====
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            $(btn.dataset.screen).classList.add('active');
            btn.classList.add('active');
        });
    });

    // ===== API =====
    function apiUrl(path) { return state.apiUrl + '/api/v1' + path; }

    async function apiCall(path, opts={}) {
        const url = apiUrl(path);
        const headers = { 'Content-Type': 'application/json', ...opts.headers };

        // Use cordova-plugin-advanced-http if available (bypasses WebView restrictions)
        if (typeof cordova !== 'undefined' && cordova.plugin && cordova.plugin.http) {
            return new Promise((resolve, reject) => {
                const method = (opts.method || 'GET').toLowerCase();
                const body = opts.body || null;

                const onSuccess = (response) => {
                    try {
                        const data = JSON.parse(response.data);
                        if (response.status >= 400) {
                            reject(new Error(data.message || data.error || 'HTTP ' + response.status));
                        } else {
                            resolve(data);
                        }
                    } catch(e) {
                        resolve(response.data);
                    }
                };

                const onError = (response) => {
                    try {
                        const data = JSON.parse(response.error);
                        reject(new Error(data.message || data.error || 'HTTP ' + response.status));
                    } catch(e) {
                        reject(new Error(response.error || 'Network error'));
                    }
                };

                if (method === 'post') {
                    cordova.plugin.http.post(url, body ? JSON.parse(body) : {}, headers, onSuccess, onError);
                } else if (method === 'put') {
                    cordova.plugin.http.put(url, body ? JSON.parse(body) : {}, headers, onSuccess, onError);
                } else if (method === 'delete') {
                    cordova.plugin.http.delete(url, {}, headers, onSuccess, onError);
                } else {
                    cordova.plugin.http.get(url, {}, headers, onSuccess, onError);
                }
            });
        }

        // Fallback to fetch (PWA / browser)
        const r = await fetch(url, { ...opts, headers });
        const d = await r.json();
        if (!r.ok) throw new Error(d.message || d.error || 'HTTP ' + r.status);
        return d;
    }

    // ===== COOKIE HELPERS =====
    function areCookiesValid() {
        if (!state.bnfCookies || !state.bnfCookies.length) return false;
        if (!state.bnfCookiesExpiry) return false;
        // Check if expired (with 5 min buffer)
        return Date.now() < (state.bnfCookiesExpiry - 300000);
    }

    function updateCookieStatusUI() {
        const dot = $('cookieDot');
        const text = $('cookieText');
        if (areCookiesValid()) {
            const exp = new Date(state.bnfCookiesExpiry);
            dot.className = 'dot ok';
            text.textContent = `Connecté (expire ${exp.toLocaleDateString('fr-FR')} ${exp.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})})`;
        } else if (state.bnfCookies && state.bnfCookies.length) {
            dot.className = 'dot expired';
            text.textContent = 'Session expirée — reconnectez-vous';
        } else {
            dot.className = 'dot none';
            text.textContent = 'Non connecté';
        }
    }

    // ===== BnF LOGIN via native plugin =====
    async function loginBnF() {
        if (!state.bnfUsername || !state.bnfPassword) {
            toast('Entrez vos credentials BnF dans les paramètres', 'error');
            return false;
        }

        // Check if Capacitor + BnfLogin plugin is available
        if (typeof window.Capacitor === 'undefined' || !window.Capacitor.Plugins || !window.Capacitor.Plugins.BnfLogin) {
            toast('Plugin BnfLogin non disponible — rebuild needed', 'error');
            return false;
        }

        try {
            const { BnfLogin } = window.Capacitor.Plugins;
            const result = await BnfLogin.login({
                username: state.bnfUsername,
                password: state.bnfPassword
            });

            if (result.success && result.cookies) {
                state.bnfCookies = result.cookies;
                // Set expiry to 8 hours from now (typical BnF session)
                state.bnfCookiesExpiry = Date.now() + (8 * 60 * 60 * 1000);
                save();
                updateCookieStatusUI();
                return true;
            } else {
                toast(result.error || 'Échec connexion BnF', 'error');
                return false;
            }
        } catch(e) {
            console.error('loginBnF error:', e);
            toast('Erreur: ' + e.message, 'error');
            return false;
        }
    }

    // ===== ENSURE COOKIES (login if needed) =====
    async function ensureCookies() {
        if (areCookiesValid()) return true;
        toast('Connexion à Europresse...', '');
        return await loginBnF();
    }

    // ===== SHARED CONTENT =====
    function showSharedBanner(text, isUrl) {
        state.sharedText = text;
        state.sharedUrl = isUrl ? text : null;
        const banner = $('sharedBanner');
        const label = $('sharedLabel');
        const content = $('sharedContent');
        banner.classList.add('visible');
        label.textContent = isUrl ? 'Lien partagé' : 'Texte partagé';
        content.textContent = text.length > 60 ? text.substring(0, 60) + '...' : text;
    }

    $('useSharedBtn').addEventListener('click', () => {
        if (state.sharedUrl) {
            $('urlInput').value = state.sharedUrl;
        } else if (state.sharedText) {
            $('urlInput').value = state.sharedText;
        }
        $('sharedBanner').classList.remove('visible');
        $('urlInput').focus();
    });

    // ===== SCRAPE =====
    async function startScraping() {
        const input = $('urlInput').value.trim();
        if (!input) { toast('Entrez une URL ou des termes', 'error'); return; }

        const isUrl = input.match(/^https?:\/\//);
        const payload = { url: isUrl ? input : '', search_terms: isUrl ? '' : input };

        // Ensure we have valid BnF cookies
        const btn = $('scrapeBtn');
        const card = $('statusCard');
        const icon = $('statusIcon');
        const title = $('statusTitle');
        const sub = $('statusSub');
        const fill = $('progressFill');
        const actions = $('actionRow');
        const dlBtn = $('downloadBtn');

        btn.disabled = true; btn.classList.add('loading');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>...';
        card.className = 'status-card visible processing';
        icon.className = 'fas fa-spinner fa-spin';
        title.textContent = 'Vérification session BnF...';
        sub.textContent = ''; fill.style.width = '5%';
        actions.style.display = 'none'; dlBtn.style.display = 'none';

        try {
            // Step 1: Ensure cookies
            const hasCookies = await ensureCookies();
            if (!hasCookies) {
                throw new Error('Impossible de se connecter à Europresse');
            }

            fill.style.width = '15%';
            title.textContent = 'Envoi au serveur...';

            // Step 2: Add cookies to payload
            payload.cookies = state.bnfCookies;

            // Step 3: Send scrape request
            const d = await apiCall('/scrape', { method: 'POST', body: JSON.stringify(payload) });

            if (d.cached) {
                card.className = 'status-card visible success';
                icon.className = 'fas fa-check-circle';
                title.textContent = 'Article en cache !';
                sub.textContent = d.article_id;
                fill.style.width = '100%';
                dlBtn.style.display = 'flex';
                dlBtn.dataset.id = d.article_id;
                addHistory(d.article_id, input, 'completed');
            } else {
                state.currentJobId = d.job_id;
                title.textContent = 'Job créé';
                sub.textContent = d.job_id;
                fill.style.width = '20%';
                actions.style.display = 'flex';
                pollJob(d.job_id, input);
            }
        } catch(e) {
            card.className = 'status-card visible error';
            icon.className = 'fas fa-exclamation-circle';
            title.textContent = 'Erreur';
            sub.textContent = e.message;
            fill.style.width = '0%';
            toast(e.message, 'error');

            // If auth error, clear cookies so next attempt re-logins
            if (e.message.includes('401') || e.message.includes('cookie') || e.message.includes('session') || e.message.includes('Europresse')) {
                state.bnfCookies = null;
                state.bnfCookiesExpiry = null;
                save();
                updateCookieStatusUI();
            }
        } finally {
            btn.disabled = false; btn.classList.remove('loading');
            btn.innerHTML = '<i class="fas fa-magic"></i> Scraper';
        }
    }

    async function pollJob(jobId, input) {
        const card = $('statusCard');
        const icon = $('statusIcon');
        const title = $('statusTitle');
        const sub = $('statusSub');
        const fill = $('progressFill');
        const actions = $('actionRow');
        const dlBtn = $('downloadBtn');

        if (state.pollInterval) clearInterval(state.pollInterval);
        state.pollInterval = setInterval(async () => {
            try {
                const d = await apiCall('/job/' + jobId);
                switch(d.status) {
                    case 'pending':
                        title.textContent = 'En attente...';
                        fill.style.width = '25%'; break;
                    case 'processing':
                        title.textContent = d.step_description || 'Traitement...';
                        sub.textContent = d.search_terms || '';
                        fill.style.width = '50%'; break;
                    case 'completed':
                        clearInterval(state.pollInterval);
                        card.className = 'status-card visible success';
                        icon.className = 'fas fa-check-circle';
                        title.textContent = 'Article scrapé !';
                        sub.textContent = d.article_id;
                        fill.style.width = '100%';
                        actions.style.display = 'none';
                        dlBtn.style.display = 'flex';
                        dlBtn.dataset.id = d.article_id;
                        addHistory(d.article_id, input, 'completed');
                        toast('Article prêt !', 'success');
                        break;
                    case 'failed':
                        clearInterval(state.pollInterval);
                        card.className = 'status-card visible error';
                        icon.className = 'fas fa-exclamation-circle';
                        title.textContent = 'Échec';
                        sub.textContent = d.error_message || '';
                        fill.style.width = '0%';
                        actions.style.display = 'none';
                        addHistory(jobId, input, 'failed');
                        toast(d.error_message || 'Échec', 'error');
                        break;
                    case 'cancelled':
                        clearInterval(state.pollInterval);
                        card.className = 'status-card visible error';
                        icon.className = 'fas fa-ban';
                        title.textContent = 'Annulé';
                        actions.style.display = 'none';
                        break;
                }
            } catch(e) { console.error('poll:', e); }
        }, 2000);
    }

    async function downloadPdf(id) {
        try {
            const r = await fetch(apiUrl('/article/' + id + '/pdf'));
            if (!r.ok) throw new Error('Erreur téléchargement');
            const blob = await r.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = id + '.pdf';
            a.click();
            URL.revokeObjectURL(a.href);
            toast('PDF téléchargé', 'success');
        } catch(e) { toast(e.message, 'error'); }
    }

    // ===== HISTORY =====
    function addHistory(id, input, status) {
        const ex = state.history.find(h => h.id === id);
        if (ex) { ex.status = status; ex.date = new Date().toISOString(); }
        else state.history.unshift({ id, input: input.substring(0, 80), status, date: new Date().toISOString() });
        state.history = state.history.slice(0, 50);
        save();
        renderHistory();
    }

    function renderHistory() {
        const list = $('historyList');
        if (!state.history.length) {
            list.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i><p>Aucun article</p></div>';
            return;
        }
        list.innerHTML = state.history.map(h => {
            const sc = h.status === 'completed' ? 'done' : 'fail';
            const ic = h.status === 'completed' ? 'fa-file-pdf' : 'fa-exclamation-triangle';
            const dt = new Date(h.date).toLocaleDateString('fr-FR', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
            return `<div class="history-item" data-id="${h.id}" data-status="${h.status}">
                <div class="icon ${sc}"><i class="fas ${ic}"></i></div>
                <div class="info"><div class="title">${esc(h.input)}</div><div class="meta">${dt}</div></div>
                <span class="badge ${sc}">${sc === 'done' ? 'Prêt' : 'Échec'}</span>
            </div>`;
        }).join('');
        list.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', () => { if (el.dataset.status === 'completed') downloadPdf(el.dataset.id); });
        });
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ===== CANCEL =====
    async function cancelJob() {
        if (!state.currentJobId) return;
        try {
            await apiCall('/job/' + state.currentJobId + '/cancel', { method: 'POST' });
            if (state.pollInterval) clearInterval(state.pollInterval);
            $('statusCard').classList.remove('visible');
            toast('Job annulé');
        } catch(e) { toast(e.message, 'error'); }
    }

    // ===== SETTINGS =====
    $('apiUrlInput').addEventListener('change', e => { state.apiUrl = e.target.value.replace(/\/+$/, ''); save(); });

    $('saveBnfBtn').addEventListener('click', () => {
        state.bnfUsername = $('bnfUsername').value.trim();
        state.bnfPassword = $('bnfPassword').value.trim();
        if (!state.bnfUsername || !state.bnfPassword) {
            toast('Entrez identifiant et mot de passe', 'error');
            return;
        }
        save();
        toast('Credentials BnF sauvegardés', 'success');
        // Clear existing cookies so next scrape triggers a fresh login
        state.bnfCookies = null;
        state.bnfCookiesExpiry = null;
        save();
        updateCookieStatusUI();
    });

    $('loginBnfBtn').addEventListener('click', async () => {
        if (!state.bnfUsername || !state.bnfPassword) {
            toast('Entrez vos credentials BnF d\'abord', 'error');
            return;
        }
        $('loginBnfBtn').disabled = true;
        $('loginBnfBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
        try {
            await loginBnF();
        } finally {
            $('loginBnfBtn').disabled = false;
            $('loginBnfBtn').innerHTML = '<i class="fas fa-key"></i> Se connecter à Europresse';
        }
    });

    $('clearBnfBtn').addEventListener('click', () => {
        state.bnfUsername = '';
        state.bnfPassword = '';
        state.bnfCookies = null;
        state.bnfCookiesExpiry = null;
        save();
        $('bnfUsername').value = '';
        $('bnfPassword').value = '';
        updateCookieStatusUI();
        toast('Données BnF supprimées', 'success');
    });

    $('clearCacheBtn').addEventListener('click', () => {
        state.history = []; save(); renderHistory();
        $('cacheCount').textContent = '0';
        toast('Cache vidé', 'success');
    });

    // ===== SCRAPE BUTTON =====
    $('scrapeBtn').addEventListener('click', startScraping);
    $('cancelBtn').addEventListener('click', cancelJob);
    $('downloadBtn').addEventListener('click', () => downloadPdf($('downloadBtn').dataset.id));

    // ===== CAPACITOR INTEGRATION =====
    function initCapacitor() {
        if (typeof window.Capacitor === 'undefined') {
            console.log('Running as PWA (no Capacitor)');
            return;
        }

        const { App } = window.Capacitor.Plugins;

        // Listen for shared content
        window.addEventListener('sharedText', (e) => {
            const text = e.detail;
            const isUrl = text.match(/^https?:\/\//);
            showSharedBanner(text, isUrl);
        });

        window.addEventListener('sharedUrl', (e) => {
            showSharedBanner(e.detail, true);
        });

        // Check pending intent on resume
        App.addListener('appStateChange', ({ isActive }) => {
            if (isActive) checkPendingIntent();
        });
    }

    async function checkPendingIntent() {
        try {
            if (typeof window.Capacitor === 'undefined') return;
            const { Preferences } = window.Capacitor.Plugins;
            const url = await Preferences.get({ key: 'shared_url' });
            const text = await Preferences.get({ key: 'shared_text' });
            if (url.value) {
                showSharedBanner(url.value, true);
                await Preferences.remove({ key: 'shared_url' });
            } else if (text.value) {
                const isUrl = text.value.match(/^https?:\/\//);
                showSharedBanner(text.value, isUrl);
                await Preferences.remove({ key: 'shared_text' });
                await Preferences.remove({ key: 'shared_title' });
            }
        } catch(e) { console.error('checkPendingIntent:', e); }
    }

    // ===== INIT =====
    load();
    $('apiUrlInput').value = state.apiUrl;
    $('bnfUsername').value = state.bnfUsername;
    $('bnfPassword').value = state.bnfPassword;
    renderHistory();
    $('cacheCount').textContent = state.history.length;
    updateCookieStatusUI();
    initCapacitor();

    // Load server history
    (async () => {
        try {
            const d = await apiCall('/articles?limit=20');
            if (d.articles) d.articles.forEach(a => addHistory(a.id, a.title || a.url, a.status || 'completed'));
        } catch(e) { console.log('Server history:', e.message); }
    })();

    console.log('Presse Scraper v3 initialized');
})();
</script>
</body>
</html>
